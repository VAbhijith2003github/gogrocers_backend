# GoGrocers Microservices NGINX Load Balancing (Updated Counts)
# Place this in /etc/nginx/sites-available/gogrocers

# --- User Service (Single Instance) ---
upstream user_servers {
    server 127.0.0.1:3001;
}

# --- Cart Service (2 Instances) ---
upstream cart_servers {
    server 127.0.0.1:3002;
    server 127.0.0.1:3012;
}

# --- Order Service (2 Instances) ---
upstream order_servers {
    server 127.0.0.1:3003;
    server 127.0.0.1:3013;
}

# --- Query Service (Single Instance) ---
upstream query_servers {
    server 127.0.0.1:3005;
}

server {
    listen 80;
    server_name _; # Default to IP for now

    # Global Proxy Settings
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # --- API ROUTES WITH CORS ---
    location /api/ {
        # Standard CORS headers
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;

        # Preflight (OPTIONS)
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        # Sub-routes for the microservices
        location /api/users/ { proxy_pass http://user_servers; }
        location /api/cart/ { proxy_pass http://cart_servers; }
        location /api/orders/ { proxy_pass http://order_servers; }
        location /api/queries/ { proxy_pass http://query_servers; }
    }

    location /health {
        return 200 'NGINX Load Balancer is UP';
        add_header Content-Type text/plain;
    }
}
