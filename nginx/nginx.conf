# GoGrocers — NGINX Reverse Proxy + Load Balancer
# Each service has its own upstream block.
# Add more server lines to any upstream to enable horizontal scaling.

events {
    worker_connections 1024;
}

http {

    # ─── Upstreams (one per service) ────────────────────────────────────────
    # To scale a service, add more instances below (e.g. server 127.0.0.1:3011;)
    # NGINX will round-robin automatically.

    upstream user_service {
        server 127.0.0.1:3001;
        # server 127.0.0.1:3011;  ← add a 2nd instance here to scale
    }

    upstream cart_service {
        server 127.0.0.1:3002;
        # server 127.0.0.1:3012;
    }

    upstream order_service {
        server 127.0.0.1:3003;
        # server 127.0.0.1:3013;
    }

    upstream query_service {
        server 127.0.0.1:3004;
        # server 127.0.0.1:3014;
    }

    # ─── Server Block ───────────────────────────────────────────────────────
    server {
        listen 80;
        server_name localhost;

        # Proxy headers (forwarded to all services)
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # ── Route: User Service ─────────────────────────────────────────────
        location /api/users/ {
            proxy_pass http://user_service;
        }

        # ── Route: Cart Service ─────────────────────────────────────────────
        location /api/cart/ {
            proxy_pass http://cart_service;
        }

        # ── Route: Order Service ────────────────────────────────────────────
        location /api/orders/ {
            proxy_pass http://order_service;
        }

        # ── Route: Query Service ────────────────────────────────────────────
        location /api/queries/ {
            proxy_pass http://query_service;
        }

        # ── Health checks (per service) ─────────────────────────────────────
        location /health/users {
            proxy_pass http://user_service/health;
        }

        location /health/cart {
            proxy_pass http://cart_service/health;
        }

        location /health/orders {
            proxy_pass http://order_service/health;
        }

        location /health/queries {
            proxy_pass http://query_service/health;
        }

        # ── NGINX self health check ──────────────────────────────────────────
        location /nginx-health {
            return 200 'NGINX OK\n';
            add_header Content-Type text/plain;
        }
    }
}
