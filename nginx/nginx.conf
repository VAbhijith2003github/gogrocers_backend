
# GoGrocers NGINX configuration
# Load-balances across 3 Node.js instances running on ports 3001, 3002, 3003

events {
    worker_connections 1024;
}

http {
    upstream gogrocers_backend {
        # Round-robin (default) across all 3 instances
        server 127.0.0.1:3001;
        server 127.0.0.1:3002;
        server 127.0.0.1:3003;
    }

    server {
        listen 80;
        server_name localhost;

        location / {
            proxy_pass http://gogrocers_backend;

            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        # Health check endpoint (direct)
        location /nginx-health {
            return 200 'NGINX OK';
            add_header Content-Type text/plain;
        }
    }
}
